name: ci
on:
  push:
  pull_request:
  schedule:
    - cron: '0 23 * * *' # 8:00 JST

env:
  TZ: "Asia/Tokyo"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.152.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: e2e-test/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: e2e-test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e-test

      - name: Build site
        run: hugo

      - name: Run tests
        run: npx playwright test
        working-directory: e2e-test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e-test/playwright-report/
          retention-days: 7

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.152.2"
の
      - name: Build
        run: hugo

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          external_repository: mosuke5-lab/mosuke5-lab.github.io
          publish_branch: main
          publish_dir: ./public
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          cname: blog.mosuke.tech

      - name: Purge cloudflare cache
        run: |
          bash ./scripts/delete_page_cache.sh ${{secrets.CF_ZONE_ID}} ${{secrets.CF_EMAIL}} ${{secrets.CF_KEY}}
